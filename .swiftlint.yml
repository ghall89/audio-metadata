only_rules:
  - fatal_error_message
  - implicitly_unwrapped_optional
  - legacy_cggeometry_functions
  - legacy_constant
  - legacy_constructor
  - legacy_nsgeometry_functions
  - unused_optional_binding
  - unowned_variable_capture
  - superfluous_disable_command
  - invalid_swiftlint_command
  - trailing_comma
  - identifier_name
  - custom_rules

excluded:
  - Carthage
  - Pods
  - .build

indentation: 2

trailing_comma:
  severity: warning
  mandatory_comma: true

identifier_name:
  excluded:
    - db
    - id
    - ok
    - to
    - a
    - b
    - at
